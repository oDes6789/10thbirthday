<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Màn chiếu — Đốm Lửa Edutalk</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #030201;
        cursor: none;
      }

      #canvas-container {
        position: fixed;
        inset: 0;
      }

      canvas {
        display: block;
      }

      .overlay {
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          radial-gradient(ellipse 90% 35% at 50% 100%, rgba(90, 25, 8, 0.5) 0%, transparent 65%),
          radial-gradient(ellipse 60% 40% at 50% 50%, rgba(20, 8, 4, 0.15) 0%, transparent 70%);
      }
    </style>
    <script type="module" crossorigin src="/assets/preview-CHCCOeky.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/flameScene-Bh3Ajwah.js">
    <link rel="modulepreload" crossorigin href="/assets/roomClient-UfG5v1hE.js">
    <link rel="stylesheet" crossorigin href="/assets/flameScene-DPDxletI.css">
    <link rel="stylesheet" crossorigin href="/assets/preview-CG9HQsyb.css">
  </head>
  <body>
    <div id="canvas-container"></div>
    <div class="overlay"></div>

    <div id="preview-ticker" aria-live="polite">
      <div id="preview-ticker-track"></div>
    </div>

    <div class="preview-hud">
      <p class="preview-title">🔥 Mừng sinh nhật 10th Edutalk</p>
      <div class="preview-online">
        <span>👥</span>
        <span><strong id="preview-online-count">0</strong> ngọn lửa đang cháy</span>
      </div>
      <p id="preview-status" hidden></p>
    </div>

    <p class="preview-hint">Double-click để toàn màn hình</p>
    <div id="preview-tooltips"></div>

  </body>
</html>
